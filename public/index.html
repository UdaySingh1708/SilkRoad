<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Silk Road - Anonymous Video & Text Chat</title>

    <meta name="description" content="Silk Road is a free anonymous video, voice and text chat platform. Meet and talk with random people worldwide securely.">

    <meta name="keywords" content="Silk Road Chat, anonymous video chat, random chat, stranger chat, online video chat, voice chat">

    <meta name="robots" content="index, follow">

    <meta name="author" content="Silk Road">

    <link rel="canonical" href="https://silkroadchat.onrender.com/">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header class="header">

        <h1>Silk Road</h1>

        <p>Anonymous Video, Voice & Text Chat</p>

        <div id="onlineCount">
            Online: 0
        </div>

    </header>

    <section id="home" class="card">

        <h2>Meet Random Strangers</h2>

        <p>
            Instantly connect with people around the world using
            secure anonymous video, voice and text chat.
        </p>

        <button id="startBtn">
            Start Chat
        </button>

    </section>

    <section id="chat" class="card hidden">

        <div class="videoContainer">

            <div class="videoBox">

                <video
                    id="remoteVideo"
                    autoplay
                    playsinline>
                </video>

                <div class="videoLabel">
                    Stranger
                </div>

            </div>

            <div class="videoBox">

                <video
                    id="localVideo"
                    autoplay
                    muted
                    playsinline>
                </video>

                <div class="videoLabel">
                    You
                </div>

            </div>

        </div>

        <div class="mediaControls">

            <button id="cameraBtn">
                📷 Camera
            </button>

            <button id="muteBtn">
                🎤 Microphone
            </button>

        </div>

        <div class="status">

            <span id="status">
                Waiting for stranger...
            </span>

        </div>

        <div id="messages" class="messages"></div>

        <div id="typing"></div>

        <div class="controls">

            <input
                id="messageInput"
                type="text"
                placeholder="Type your message..."
                autocomplete="off">

            <button id="sendBtn">
                Send
            </button>

        </div>

        <div class="buttons">

            <button id="nextBtn">
                Next Stranger
            </button>

            <button id="disconnectBtn">
                Disconnect
            </button>

            <button id="reportBtn" class="danger-btn">
                🚩 Report
            </button>

            <button id="blockBtn" class="danger-btn">
                🚫 Block
            </button>

        </div>

    </section>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="app.js"></script>

</body>

</html>
