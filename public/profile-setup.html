<!DOCTYPE html>
<html>

<head>

<title>Complete Profile - Silk Road</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.container{

    width:360px;

    background:#222;

    padding:30px;

    border-radius:15px;

    text-align:center;

}

img{

    width:120px;
    height:120px;

    border-radius:50%;

    object-fit:cover;

    background:#333;

    border:3px solid #444;

}

input{

    width:90%;

    padding:12px;

    margin-top:15px;

    border:none;

    border-radius:8px;

}

button{

    margin-top:20px;

    width:100%;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#27ae60;

    color:white;

    cursor:pointer;

    font-size:16px;

}

button:hover{

    background:#219150;

}

</style>

</head>

<body>

<div class="container">

<h2>Complete Your Profile</h2>

<img
id="preview"
src="https://via.placeholder.com/120?text=Photo">

<br><br>

<input
type="file"
id="photo"
accept="image/*">

<input
type="text"
id="name"
placeholder="Choose your name">

<button
onclick="saveProfile()">

Save Profile

</button>

</div>

<script>

const photo =
document.getElementById("photo");

const preview =
document.getElementById("preview");


photo.addEventListener(

"change",

function(){

const file =
this.files[0];

if(!file) return;

preview.src =
URL.createObjectURL(file);

}


);


async function saveProfile(){

const displayName =
document.getElementById("name")
.value
.trim();

if(!displayName){

alert("Enter your name");

return;

}

const file =
photo.files[0];

if(!file){

alert("Choose a profile picture");

return;

}

const formData =
new FormData();

formData.append(
"displayName",
displayName
);

formData.append(
"avatar",
file
);

const response =
await fetch(

"/auth/profile-update",

{

method:"POST",

body:formData

}

);

const data =
await response.json();

if(data.success){

alert("Profile Saved");

window.location.href="/";

}
else{

alert(data.message);

}

}

</script>

</body>
</html>
